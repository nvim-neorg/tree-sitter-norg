name: Parser fuzzing

on:
  push:
    branches: [main]
    paths:
      - grammar.js
      - src/scanner.c
  pull_request:
    paths:
      - grammar.js
      - src/scanner.c

jobs:
  test:
    name: Parser fuzzing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tree-sitter/fuzz-action@v4
